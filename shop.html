<!doctype html>
<html>
  <head>
    <title>Shop | Success Gents</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <nav>
      <div class="logo">Success Gents</div>

      <div class="menu">
        <a href="index.html#home">Home</a>
        <a href="index.html#about">About</a>
        <a href="index.html#products">Products</a>
        <a href="shop.html" class="active">Shop</a>
        <a href="index.html#partner">Partner</a>
        <a href="index.html#contact">Contact</a>
      </div>
    </nav>

    <section class="section">
      <div class="shop-container">
        <!-- LEFT CATEGORY -->

        <div class="categories">
          <h3>Categories</h3>

          <ul>
            <li data-category="all">All</li>
            <li data-category="luggage">Luggage</li>
            <li data-category="bags">Bags</li>
            <li data-category="wallets">Wallets</li>
            <li data-category="hats">Hats</li>
          </ul>
        </div>

        <!-- RIGHT PRODUCTS -->

        <div class="shop-right">
          <input type="text" id="search" placeholder="Search products" />

          <div class="product-grid">
            <!-- PRODUCT -->

            <div
              class="product-card"
              data-category="bags"
              data-size="false"
              data-color="true"
              data-colors="black,grey,silver"
            >
              <img src="bag1.jpg" />
              <h4>Urban Travel Bag</h4>
              <p>RM189</p>
            </div>

            <div
              class="product-card"
              data-category="luggage"
              data-size="true"
              data-color="false"
            >
              <img src="luggage1.jpg" />
              <h4>Explorer Luggage</h4>
              <p>RM399</p>
            </div>

            <div
              class="product-card"
              data-category="wallets"
              data-size="false"
              data-color="true"
              data-colors="lightbrown,darkbrown,black"
            >
              <img src="wallet1.jpg" />
              <h4>Classic Leather Wallet</h4>
              <p>RM79</p>
            </div>

            <div
              class="product-card"
              data-category="hats"
              data-size="false"
              data-color="true"
              data-colors="cyan,white,brown,black"
            >
              <img src="hat1.jpg" />
              <h4>Minimal Cap</h4>
              <p>RM59</p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- PRODUCT POPUP -->

    <div class="product-modal" id="productModal">
      <div class="modal-content">
        <span class="close">&times;</span>

        <div class="modal-grid">
          <!-- IMAGE -->

          <div class="modal-image">
            <img id="modalImg" />
          </div>

          <!-- INFO -->

          <div class="modal-info">
            <h2 id="modalTitle"></h2>

            <p id="modalPrice"></p>

            <!-- SIZE -->

            <div id="sizeBlock">
              <label>Size</label>

              <div class="size-options">
                <button data-price="399">20"</button>

                <button data-price="459">24"</button>

                <button data-price="519">28"</button>
              </div>
            </div>
            <!-- COLOR -->

            <div id="colorBlock">
              <label>Color</label>

              <div class="color-options"></div>
            </div>

            <!-- QUANTITY -->

            <label>Quantity</label>

            <div class="quantity">
              <input type="number" value="1" min="1" />
            </div>

            <button class="add-cart">Add to Cart</button>

            <p id="cartError"></p>
          </div>
        </div>
      </div>
    </div>

    <script src="shop.js"></script>
    <div class="floating-cart" id="floatingCart">
      <img src="cart.png" />

      <span id="cartCount">0</span>
    </div>

    <div class="cart-modal" id="cartModal">
      <div class="cart-box">
        <div class="cart-header">
          <h2>Your Cart</h2>

          <span id="closeCart">✕</span>
        </div>

        <div id="cartItems"></div>

        <div class="cart-total">
          <h3>Total: RM<span id="cartTotal">0</span></h3>
        </div>

        <button id="checkoutBtn">Checkout</button>
      </div>
    </div>
  </body>
</html>
